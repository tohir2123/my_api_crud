[alembic]

script_location = alembic

sqlalchemy.url = 

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_app]
level = INFO
handlers =
qualname = app

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

[handler_file]
class = FileHandler
args = ("alembic.log", "w")
level = INFO
formatter = generic
handler_root = console
handler_sqlalchemy = console
handler_app = file
handler_alembic = console

[logger_alembic]
level = WARN
handlers = file
qualname = alembic